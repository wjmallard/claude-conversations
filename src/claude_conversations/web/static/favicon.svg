<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#d97757"/>
  <!-- y is the BASELINE, so it is set from the rendered x-height of "cc",
       not the font size: measured, the ink then spans 8.7..22.6 and centers
       on 16. -->
  <text x="16" y="22.6" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
        font-weight="500" font-size="24" fill="#000000">cc</text>
</svg>
